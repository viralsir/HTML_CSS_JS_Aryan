<body>
<a href="JS_Student_Demo4_1.html">Entry</a> | <a href="JS_Student_Demo4_2.html">View</a>
<div class="row" >
  <!-- student Form --->
  <div class="col" style="text-align: right;">
    <form action="">
      <table class="table table-bordered">
         <tr>
           <th colspan="2" style="text-align: center;"> Student Info</th>
         </tr>
          <tr>
            <th> Roll No:</th>
            <td><input type="number" id="rollno" class="form-control" min="1"></td>
          </tr>
          <tr>
            <th> Name :</th>
            <td><input type="text" id="name" class="form-control"></td>
          </tr>
           <tr>
             <th> Maths :</th>
             <td><input type="number" id="maths" class="form-control" min="1" max="100" onfocusout="validate_maths()"> <b id="maths_error" style="color:red"></b> </td>
           </tr>
           <tr>
             <th> English :</th>
             <td><input type="number" id="english" class="form-control" min="1" max="100" onfocusout="validate_english()"><b id="english_error" style="color:red"></b></td>
           </tr>
          <tr >
            <td colspan="2" style="text-align: center;"><input type="button" class="btn-outline-primary btn" value="save" onclick="savedata()"> <input type="reset" class="btn btn-outline-danger" value="clear"> </td>
          </tr>
      </table>
    </form>

  </div>



</div>


<script src="create_element_demo.js">


</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
