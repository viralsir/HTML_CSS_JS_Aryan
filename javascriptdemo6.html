<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>java script demo6</title>

  <script>

    document.addEventListener("DOMContentLoaded", function() {


      document.getElementById("greetbtn").onclick = () =>{

        var name=document.getElementById('username').value;
        document.getElementById('output').innerHTML="Welcome "+ name;

      };


    })



  </script>


</head>
<body>
User Name : <input type="text" id="username">
<input type="button" id="greetbtn" value="greet">

<h1 id="output"></h1>


</body>
</html>
