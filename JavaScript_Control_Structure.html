
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
No1: <input type="number" id="no1" > <br/> <br/>
No2: <input type="number" id="no2" > <br/><br/>
No3: <input type="number" id="no3" > <br/> <br/>

<br/>
<input type="button" value="arith" id="arithbtn">
<input type="button" value="Answer" id="answerbtn">

<input type="reset" value="Clear">

<h1 id="output"></h1>



<script>


  document.getElementById("arithbtn").onclick = function(){

    var no1 = parseInt(document.getElementById("no1").value);
    var no2 = parseInt(document.getElementById("no2").value);

    var ans=no1+no2;
    document.getElementById("output").innerHTML="Sum :"+ans;



  }




  document.getElementById("answerbtn").onclick = () =>{

    var no1=parseInt(document.getElementById("no1").value);
    var no2=parseInt(document.getElementById("no2").value);
    let no3=parseInt(document.getElementById("no3").value);

    if(no1>0 && no2>0 && no3>0)
    {

      if(no1>no2 && no1>no3)
      {
        document.getElementById("output").innerHTML=no1+" is a maximum number";
      }
      else if(no2>no1 && no2>no3)
      {
        document.getElementById("output").innerHTML=no2+" is a maximum number";
      }
      else
      {
        document.getElementById("output").innerHTML=no3+" is a maximum number";
      }



    }
    else{
      document.getElementById("output").innerHTML="<b style=color:red>All Number should be positive </b>";
    }





  }



</script>


</body>
</html>
