<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input Demo</title>
</head>
<body>
<form action="">
  User Name : <input name="username" type="text" placeholder="enter user name"   size="10"> <br/>
  Password : <input type="password" size="10"> <br/>
   Gender : <input type="radio" name="Gender"  value="Male" >Male
  <input type="radio" name="Gender" value="Female" >Female
  <br/> Education :
  <input type="checkbox" name="education" value="1oth">1oth
  <input type="checkbox" name="education" value="12th">12th
  <input type="checkbox" name="education" value="B.com">B.com
  <input type="checkbox" name="education" value="M.com">M.com

  <br>
  Country :
  <select name="countryselect" id="">
    <option value="India">India</option>
    <option value="Iran">Iran</option>
    <option value="Iraq">Iraq</option>
    <option value="China">China</option>
    <option value="Chili">Chili</option>
    <option value="UK">UK</option>
    <option value="USA">USA</option>
  </select>
 <br/>

  Country : <input  name="countrydata" list="countrylist">

  <datalist id="countrylist">
    <option value="India">India</option>
    <option value="Iran">Iran</option>
    <option value="Iraq">Iraq</option>
    <option value="China">China</option>
    <option value="Chili">Chili</option>
    <option value="UK">UK</option>
    <option value="USA">USA</option>
  </datalist>

  <br/>

  Date : <input type="date"> <br>
  Date and Time : <input type="datetime-local">
  Time : <input type="time"> <br>
  Week : <input type="week"> <br>
  month : <input type="month">

  <br/>
  <input type="button" value="login">
  <input type="submit" value="login">
  <input type="reset" value="clear">
  <br/>
  <input type="color">
  <br/>
  <input type="file">

</form>
</body>
</html>
