<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <style>

  </style>
</head>
<body>
<div class="row" >
  <!-- student Form --->
  <div class="col-4" style="text-align: right;">
    <form action="">
      <table class="table table-bordered">
         <tr>
           <th colspan="2" style="text-align: center;"> Student Info</th>
         </tr>
          <tr>
            <th> Roll No:</th>
            <td><input type="number" id="rollno" class="form-control" min="1"></td>
          </tr>
          <tr>
            <th> Name :</th>
            <td><input type="text" id="name" class="form-control"></td>
          </tr>
           <tr>
             <th> Maths :</th>
             <td><input type="number" id="maths" class="form-control" min="1" max="100" onfocusout="validate_maths()"> <b id="maths_error" style="color:red"></b> </td>
           </tr>
           <tr>
             <th> English :</th>
             <td><input type="number" id="english" class="form-control" min="1" max="100" onfocusout="validate_english()"><b id="english_error" style="color:red"></b></td>
           </tr>
          <tr >
            <td colspan="2" style="text-align: center;"><input type="button" class="btn-outline-primary btn" value="save" onclick="savedata()"> <input type="reset" class="btn btn-outline-danger" value="clear"> </td>
          </tr>
      </table>
    </form>

  </div>

  <!-- student View -->
  <div class="col-8 text-center" style="align:left;" >
            <table id="studentlisttable" class="table table-striped table-bordered">
                <tr>
                  <th colspan="7"  class="text-center"> Student List </th>
                </tr>
                 <tr>
                   <th> Roll No</th> <th>Name</th> <th> Maths</th> <th>English</th> <th>Status</th> <th>Total </th> <th>Avg</th>
                 </tr>

            </table>

  </div>


</div>


<script >
           function validate_maths()
           {
                 let maths=parseInt(document.getElementById("maths").value);
                 if (maths<0 || maths>100)
                 {
                      document.getElementById("maths_error").innerHTML = "Marksh should be between 1 and 100";
                      document.getElementById("maths").style.borderColor = "red";
                 }
                 else
                 {
                   document.getElementById("maths_error").innerHTML = "";
                   document.getElementById("maths").style.borderColor = "black";
                 }

           }


           function validate_english()
           {
             let maths=parseInt(document.getElementById("english").value);
             if(maths<0 || maths>100)
             {
               document.getElementById("english_error").innerHTML = "Marksh should be between 1 and 100";
             }
             else
             {
               document.getElementById("english_error").innerHTML = "";
             }

           }



           function savedata()
         {
             let rollno= parseInt(document.getElementById("rollno").value);
             let name=document.getElementById("name").value;
             let maths= parseInt(document.getElementById("maths").value);
             let english= parseInt(document.getElementById("english").value);

             let tr=document.createElement("tr");
             let td_rollno=document.createElement("td");
             let td_name=document.createElement("td");
             let td_maths=document.createElement("td");
             let td_english=document.createElement("td");
             let td_pass_fail=document.createElement("td");
             let td_total=document.createElement("td");
             let td_avg=document.createElement("td");


             td_rollno.innerHTML=rollno;
             td_name.innerHTML=name;
             td_maths.innerHTML=maths;
             td_english.innerHTML=english;

               if(maths>=35 && english>=35)
               {
                 let total=maths+english;
                 let avg= total/2;
                 td_pass_fail.innerHTML="Pass";
                 td_pass_fail.style.color="green";
                 td_total.innerHTML=total;
                 td_avg.innerHTML=avg;

               }
               else
               {
                 td_pass_fail.innerHTML="Fail";
                 td_pass_fail.style.color="red";
                 td_total.innerHTML="-";
                 td_avg.innerHTML="-";

               }

               tr.append(td_rollno);
               tr.append(td_name);
               tr.append(td_maths);
               tr.append(td_english);
               tr.append(td_pass_fail);
               tr.append(td_total);
               tr.append(td_avg);

               let table=document.getElementById("studentlisttable");
               table.append(tr);

               document.getElementById("rollno").value="";
               document.getElementById("name").value="";
               document.getElementById("maths").value="";
               document.getElementById("english").value="";





         }

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
