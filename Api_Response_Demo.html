<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Api Response Demo</title>
</head>
<body>

<input type="button" value="Load Data" onclick="loadData()">

<table id="dataTable" border="3px">
   <tr>
     <th> User Id</th>  <th> ID</th> <th> Title </th> <th>Completed</th>
   </tr>
</table>


<script>

  function loadData() {

    fetch('https://jsonplaceholder.typicode.com/todos/')
      .then(response => response.json())
      .then(json_array => {

        let table = document.getElementById('dataTable');

        for (let element of json_array) {

            let tr=document.createElement('tr');
            let td_userid=document.createElement("td");
            td_userid.innerHTML=element['userId'];
            let td_id=document.createElement("td");
            td_id.innerHTML=element['id'];
            let td_title=document.createElement("td");
            td_title.innerHTML=element['title'];
            let td_completed=document.createElement("td");
            td_completed.innerHTML=element['completed'];

            tr.append(td_userid);
            tr.append(td_id)
            tr.append(td_title);
            tr.append(td_completed);

            table.append(tr);

        }



      })


  }


</script>

</body>
</html>
